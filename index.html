<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>XYSYS · 轻量下载</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: linear-gradient(145deg, #f9faff 0%, #f0f5fd 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { max-width: 480px; width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 48px; box-shadow: 0 30px 60px -20px rgba(0, 50, 100, 0.25); border: 1px solid rgba(255,255,255,0.5); padding: 32px 24px 36px 24px; }
        h1 { font-size: 34px; font-weight: 650; text-align: center; background: linear-gradient(135deg, #1E2E5C, #2B3D75); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
        .weixin-guide { text-align: center; }
        .manual-link-box { background: rgba(255,255,255,0.8); border-radius: 12px; padding: 16px; margin: 16px 0; border: 1px solid #cddfff; word-break: break-all; font-family: monospace; font-size: 14px; color: #12458c; border-left: 5px solid #4f8cff; }
        .btn-primary { background: #1b2f56; border: none; border-radius: 100px; padding: 20px 24px; color: white; font-size: 20px; font-weight: 600; width: 100%; cursor: pointer; transition: all 0.2s; }
        .btn-primary:disabled { background: #6c7f9e; cursor: not-allowed; opacity: 0.8; }
        .copy-hint { font-size: 15px; color: #3865a0; background: #eaf2ff; border-radius: 28px; padding: 14px 18px; margin-top: 12px; }
        #download-iframe { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>XYSYS</h1>
        <div id="dynamic-content" class="dynamic-content"></div>
    </div>

    <iframe id="download-iframe"></iframe>

    <script>
        (function() {
            function isInTencentApp() {
                var ua = navigator.userAgent.toLowerCase();
                return /micromessenger|qq\//.test(ua) || ua.indexOf('wechat') !== -1; 
            }
            var MAIN_DOWNLOAD_URL = 'https://easylink.cc/hu0cy2'; 

            var container = document.getElementById('dynamic-content');
            var dlIframe = document.getElementById('download-iframe');

            if (isInTencentApp()) {
                container.innerHTML = `
                    <div class="weixin-guide">
                        <div style="font-size:40px; margin-bottom:10px;">🌐</div>
                        <div style="font-weight:600; font-size:22px; color:#0e2748;">请使用浏览器打开</div>
                        <div class="copy-hint">复制以下链接，在浏览器中打开下载</div>
                        <div class="manual-link-box">${MAIN_DOWNLOAD_URL}</div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="download-zone">
                        <button class="btn-primary" id="mainDownloadBtn">
                            🚀 立即下载 (140MB)
                        </button>
                        <p style="text-align:center; color:#6c7f9e; font-size:14px; margin-top:15px;">
                            点击后请稍候，系统将直接唤起下载
                        </p>
                    </div>
                `;

                var mainBtn = document.getElementById('mainDownloadBtn');
                
                mainBtn.addEventListener('click', function() {
                    mainBtn.disabled = true;
                    mainBtn.innerText = "正在请求下载...";
                    dlIframe.src = MAIN_DOWNLOAD_URL;
                    setTimeout(function() {
                        mainBtn.disabled = false;
                        mainBtn.innerText = "🚀 立即下载 (140MB)";
                    }, 3000);
                });
            }
        })();
    </script>
</body>
</html>
