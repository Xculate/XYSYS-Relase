<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>XYSYS · 轻量下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9faff 0%, #f0f5fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px rgba(0, 50, 100, 0.25), 
                        0 8px 20px -8px rgba(0, 32, 64, 0.1),
                        inset 0 1px 1px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 32px 24px 36px 24px;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 34px;
            font-weight: 650;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1E2E5C, #2B3D75);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            line-height: 1.1;
            text-align: center;
            padding: 0 8px;
        }

        .sub {
            font-size: 17px;
            font-weight: 400;
            color: #4a5a7a;
            text-align: center;
            margin-bottom: 24px;
            background: rgba(230, 241, 255, 0.7);
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 2px 6px rgba(0,40,80,0.05);
        }

        .dynamic-content {
            min-height: 260px;
            width: 100%;
            transition: all 0.25s;
        }

        /* ========== 微信/QQ内专用引导样式 ========== */
        .weixin-guide {
            text-align: center;
            animation: fadeSlideIn 0.35s ease;
        }

        .guide-card {
            background: rgba(255,255,255,0.6);
            border-radius: 40px;
            padding: 24px 18px 28px 18px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 24px -12px rgba(0,70,150,0.2);
            backdrop-filter: blur(4px);
        }

        .step-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0 28px 0;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
            padding: 12px 20px;
            border-radius: 80px;
            box-shadow: 0 6px 14px rgba(0, 30, 60, 0.05);
            border: 1px solid rgba(210, 225, 245, 0.6);
            text-align: left;
        }

        .step-number {
            width: 42px;
            height: 42px;
            background: #eef4fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #1e3e7c;
            flex-shrink: 0;
            border: 1px solid white;
        }

        .step-text {
            font-weight: 500;
            font-size: 16px;
            color: #1f2c48;
        }
        .step-text small {
            font-weight: 400;
            font-size: 14px;
            color: #65748c;
            display: block;
            margin-top: 4px;
        }

        .manual-link-box {
            background: rgba(255,255,255,0.8);
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0 8px;
            border: 1px solid #cddfff;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            color: #12458c;
            text-align: left;
            border-left: 5px solid #4f8cff;
            box-shadow: inset 0 1px 4px #e0ecff;
        }

        .browser-icon {
            font-size: 40px;
            line-height: 1;
            margin: 10px 0 4px;
            filter: drop-shadow(0 4px 4px rgba(0,80,200,0.15));
        }

        .copy-hint {
            font-size: 15px;
            color: #3865a0;
            background: #eaf2ff;
            border-radius: 28px;
            padding: 14px 18px;
            margin: 12px 0 0;
            border: 1px solid white;
        }

        /* ========== 外部浏览器下载样式 ========== */
        .download-zone {
            background: rgba(255,255,255,0.5);
            border-radius: 48px;
            padding: 18px 12px 26px 12px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
            border-radius: 100px;
            padding: 12px 24px;
            margin: 20px 0 26px;
            border: 1px solid #e7f0ff;
            box-shadow: 0 10px 20px -18px #4070c0;
        }
        .file-icon {
            font-size: 36px;
        }
        .file-detail {
            text-align: left;
        }
        .file-name {
            font-weight: 650;
            font-size: 18px;
            color: #102a4c;
        }
        .file-meta {
            color: #5b6f8c;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .btn-primary {
            background: #1b2f56;
            border: none;
            border-radius: 100px;
            padding: 20px 24px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 18px 28px -16px #0b2542, 0 0 0 1px rgba(255,255,255,0.3) inset;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-primary:active {
            transform: scale(0.98);
            background: #142648;
            box-shadow: 0 6px 12px -8px #0a1a30;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.9);
            border: 1.5px solid #b4c9f0;
            border-radius: 100px;
            padding: 16px 24px;
            color: #1b2f56;
            font-weight: 550;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0,20,50,0.03);
        }
        .btn-secondary:active {
            background: white;
            border-color: #7da2ef;
        }

        .progress {
            height: 20px;
            background: rgba(240, 240, 240, 0.6);
            border-radius: 30px;
            overflow: hidden;
            margin: 20px 0 16px;
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4f8cff, #7aa5ff);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(79,140,255,0.5);
        }

        .status {
            margin: 16px 0 12px;
            padding: 16px 18px;
            border-radius: 40px;
            font-size: 15px;
            text-align: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.9);
        }
        .status.loading { background: #e3f2fd; color: #0d47a1; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }

        .retry-hint {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(255,243,205,0.7);
            border-radius: 32px;
            font-size: 14px;
            color: #856404;
            backdrop-filter: blur(4px);
            border: 1px solid #ffe9b0;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 14px;
            color: #6c7f9e;
            text-align: center;
            border-top: 1px solid rgba(160, 185, 225, 0.4);
            padding-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>XYSYS</h1>
        <div class="sub">⚡️ 拼接下载 · 智能加速</div>
        <div id="dynamic-content" class="dynamic-content"></div>
        <div class="footer-note">
            <span>🛡️ 安全校验</span> <span style="opacity:0.5;">|</span> <span>分片完整性保护</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 检测环境 ----------
            function isInTencentApp() {
                var ua = navigator.userAgent.toLowerCase();
                return /micromessenger|qq\//.test(ua) || ua.indexOf('wechat') !== -1 || (ua.indexOf('qq') !== -1 && ua.indexOf('mqqbrowser') === -1); 
            }

            // ---------- 原来的 FileDownloader 逻辑 (整合) ----------
            class FileDownloader {
                constructor() {
                    this.manifest = null;
                    this.parts = [];
                    this.downloadedParts = [];
                    this.maxRetries = 3;
                    // 配置文件路径：指向你的 manifest.json
                    this.MANIFEST_URL = 'https://gitee.com/bearThomas/XYSYS-Release/releases/download/XYSYSDOWNLOAD/manifest.json'; // 可根据需要修改
                }

                async loadManifest() {
                    try {
                        const response = await fetch(this.MANIFEST_URL);
                        if (!response.ok) throw new Error('无法加载文件信息');
                        this.manifest = await response.json();

                        // 更新文件信息显示（如果存在对应元素）
                        const fileInfoDiv = document.getElementById('fileInfo');
                        if (fileInfoDiv) {
                            fileInfoDiv.style.display = 'flex';
                            document.getElementById('fileName').textContent = this.manifest.file_name;
                            document.getElementById('fileSize').textContent = (this.manifest.file_size / 1024 / 1024).toFixed(2);
                            document.getElementById('chunkCount').textContent = this.manifest.chunk_count;
                        }

                        // 更新状态
                        this.updateStatus('✅ 文件信息加载成功，点击开始下载', 'loading');
                        const downloadBtn = document.getElementById('downloadBtn');
                        if (downloadBtn) downloadBtn.disabled = false;
                        
                    } catch (error) {
                        this.updateStatus(`❌ 加载失败：${error.message}`, 'error');
                    }
                }

                async downloadPart(partInfo, retry = 0) {
                    try {
                        // 构建分片URL - 假设分片和manifest在同一目录
                        const partUrl = `https://gitee.com/bearThomas/XYSYS-Release/releases/download/XYSYSDOWNLOAD/XYSYS1.0.1.20.exe.part001/${partInfo.name}`;
                        
                        const response = await fetch(partUrl);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const blob = await response.blob();
                        return blob;
                        
                    } catch (error) {
                        if (retry < this.maxRetries) {
                            const waitTime = Math.pow(2, retry) * 1000;
                            this.updateStatus(`⏳ 下载分片 ${partInfo.name} 失败，${waitTime/1000}秒后重试 (${retry+1}/${this.maxRetries})...`, 'loading');
                            
                            await new Promise(r => setTimeout(r, waitTime));
                            return this.downloadPart(partInfo, retry + 1);
                        }
                        throw error;
                    }
                }

                updateStatus(message, type = 'loading') {
                    const statusDiv = document.getElementById('downloadStatus');
                    if (statusDiv) {
                        statusDiv.className = `status ${type}`;
                        statusDiv.innerHTML = message;
                    }
                }

                updateProgress(percent) {
                    const progressBar = document.getElementById('progressBar');
                    if (progressBar) {
                        progressBar.style.width = `${percent}%`;
                    }
                }

                async startDownload() {
                    if (!this.manifest) return;
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    if (downloadBtn) downloadBtn.disabled = true;
                    
                    this.updateStatus('⏳ 准备下载...', 'loading');
                    this.updateProgress(0);

                    try {
                        const parts = this.manifest.parts;
                        const totalParts = parts.length;
                        let downloadedBlobs = [];

                        // 按顺序下载所有分片
                        for (let i = 0; i < totalParts; i++) {
                            const part = parts[i];
                            
                            this.updateStatus(`⏳ 正在下载分片 ${i+1}/${totalParts}: ${part.name}`, 'loading');
                            
                            const blob = await this.downloadPart(part);
                            downloadedBlobs[i] = blob;
                            
                            // 更新进度
                            const progress = ((i + 1) / totalParts) * 100;
                            this.updateProgress(progress);
                        }

                        // 拼接所有分片
                        this.updateStatus('🔄 正在拼接文件...', 'loading');
                        const fullFileBlob = new Blob(downloadedBlobs);

                        // 校验文件大小
                        if (fullFileBlob.size !== this.manifest.file_size) {
                            throw new Error('文件大小不匹配，可能下载不完整');
                        }

                        // 触发下载
                        const url = URL.createObjectURL(fullFileBlob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = this.manifest.file_name;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);

                        this.updateStatus(`✅ 下载完成！文件已保存为: ${this.manifest.file_name}`, 'success');
                        this.updateProgress(100);

                    } catch (error) {
                        this.updateStatus(`❌ 下载失败：${error.message}。请稍后重试。`, 'error');
                        
                        // 显示错误详情
                        const retryHint = document.getElementById('retryHint');
                        if (retryHint) {
                            retryHint.style.display = 'block';
                            retryHint.innerHTML = `<strong>🔍 错误详情：</strong>${error.message}`;
                        }
                    } finally {
                        if (downloadBtn) downloadBtn.disabled = false;
                    }
                }
            }

            // ---------- 页面渲染 ----------
            const container = document.getElementById('dynamic-content');
            if (!container) return;

            // 创建下载器实例（但先不加载，等渲染后再看情况）
            const downloader = new FileDownloader();

            if (isInTencentApp()) {
                // ---------- 微信/QQ内：只显示引导 ----------
                container.innerHTML = `
                    <div class="weixin-guide">
                        <div class="browser-icon">🌐</div>
                        <div class="guide-card">
                            <div style="font-weight: 600; font-size: 22px; color: #0e2748; margin-bottom: 6px;">请使用浏览器打开</div>
                            <p style="color: #4f6183; margin-bottom: 18px; font-size: 16px; padding: 0 6px;">微信/QQ内无法直接下载，按步骤操作即可</p>
                            
                            <div class="step-container">
                                <div class="step-item">
                                    <div class="step-number">1</div>
                                    <div class="step-text">
                                        点击右上角 <b style="background:#edf3ff; padding:2px 10px; border-radius:40px;">···</b>
                                        <small>菜单在右上角</small>
                                    </div>
                                </div>
                                <div class="step-item">
                                    <div class="step-number">2</div>
                                    <div class="step-text">
                                        选择 <b style="background:#edf3ff; padding:2px 14px; border-radius:40px;">在浏览器中打开</b>
                                        <small>Safari / Chrome / 系统浏览器</small>
                                    </div>
                                </div>
                            </div>

                            <div class="manual-link-box">
                                ⚙️ 下载链接 (长按复制)<br>
                                <span style="font-size: 15px; word-break:break-all; user-select: all;">${window.location.href}</span>
                            </div>

                            <div class="copy-hint">
                                ✨ 复制链接后粘贴到浏览器地址栏
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // ---------- 外部浏览器：显示下载界面，整合原逻辑 ----------
                container.innerHTML = `
                    <div class="download-zone">
                        <!-- 文件信息 -->
                        <div id="fileInfo" class="file-info" style="display: none;">
                            <div class="file-icon">📦</div>
                            <div class="file-detail">
                                <div class="file-name" id="fileName">加载中...</div>
                                <div class="file-meta" id="fileMeta">
                                    <span id="fileSize">0</span> MB · <span id="chunkCount">0</span> 个分片
                                </div>
                            </div>
                        </div>

                        <!-- 进度条 -->
                        <div class="progress">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>

                        <!-- 状态信息 -->
                        <div id="downloadStatus" class="status loading">
                            ⏳ 正在加载文件信息...
                        </div>

                        <!-- 按钮组 -->
                        <div class="btn-group">
                            <button class="btn-primary" id="downloadBtn" disabled>
                                ⬇️ 开始下载
                            </button>
                        </div>

                        <!-- 错误提示区（初始隐藏） -->
                        <div id="retryHint" class="retry-hint" style="display: none;"></div>
                    </div>
                `;

                // 绑定下载按钮事件
                setTimeout(() => {
                    const downloadBtn = document.getElementById('downloadBtn');
                    if (downloadBtn) {
                        downloadBtn.addEventListener('click', () => downloader.startDownload());
                    }
                }, 20);

                // 加载文件信息
                downloader.loadManifest();
            }
        })();
    </script>
</body>
</html>
